version: "3.9"

volumes:
  pgdata:
  redisdata:
  miniodata:

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: hermes-postgres
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: hermes-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:1979:1979"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "1979", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: hermes-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: hermes
      MINIO_ROOT_PASSWORD: hermes-minio-secret
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
