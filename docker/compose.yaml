name: hermes

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    restart: unless-stopped
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "InfiLed@Hermes_redis", "-p", "1979", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:1979:1979"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 128M

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermes}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 128M

  api:
    image: hermes-api:latest
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://:InfiLed%40Hermes_redis@redis:1979/0
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      APP_BASE_URL: ""
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-Hermes@2026}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-林知微}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-workspace}
      # Hermes Agent — set HERMES_BIN to the absolute path on the host (requires
      # the binary to also be accessible inside the container via a bind mount).
      # Set HERMES_HOME to the mounted profile directory (see volumes below).
      HERMES_BIN: ${HERMES_BIN:-hermes}
      HERMES_HOME: ${HERMES_HOME:-}
    # To expose host hermes installation to the API scanner, uncomment these
    # volumes and set HERMES_BIN / HERMES_HOME in a .env file:
    #
    #   HERMES_BIN=/hermes-host/bin/hermes
    #   HERMES_HOME=/hermes-host/.hermes
    #
    # volumes:
    #   - ${HOME}/.local/bin:/hermes-host/bin:ro
    #   - ${HOME}/.hermes:/hermes-host/.hermes:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  agent-runner:
    image: hermes-agent-runner:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://:InfiLed%40Hermes_redis@redis:1979/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      WORKSPACE_ROOT: /var/hermes/workspaces
      HERMES_BIN: ${HERMES_BIN:-hermes}
      HERMES_ACP_ARGS: ${HERMES_ACP_ARGS:-["acp"]}
      HERMES_ACP_AUTH_METHOD: ${HERMES_ACP_AUTH_METHOD:-}
      ACP_ALLOW_MOCK_FALLBACK: ${ACP_ALLOW_MOCK_FALLBACK:-true}
      ACP_CONSUMER: runner-1
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hermes}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hermes-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hermes-workspace}
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_CMD: ${SANDBOX_CMD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      # No HTTP server — liveness = python up + Redis (its only hot dependency) reachable.
      test: ["CMD-SHELL", "python -c \"import os,redis; redis.Redis.from_url(os.environ['REDIS_URL']).ping()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - workspacedata:/var/hermes/workspaces
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Per-profile HERMES_HOME: the runner launches the agent with HERMES_HOME
    # pointing at the profile dir recorded by the API's /profiles/scan. For
    # this to work in Docker, mount the host ~/.hermes here READ-WRITE (the
    # agent persists memory/sessions inside it) at the SAME absolute path the
    # api container saw during the scan, e.g.:
    #
    #   - ${HOME}/.local/bin:/hermes-host/bin:ro
    #   - ${HOME}/.hermes:/hermes-host/.hermes
    #
    # If a profile's dir is missing inside this container, the runner logs a
    # warning and falls back to the default HERMES_HOME.

  web:
    image: hermes-web:latest
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8081:80"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hermes-grafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: "redis://:InfiLed@Hermes_redis@redis:1979"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  pgdata:
  redisdata:
  miniodata:
  workspacedata:
  prometheusdata:
  grafanadata:
