# Redis 安全配置 — 生产环境加固
# 绑定容器内所有接口（Docker 内部网络通信需要），
# 外部访问通过 Docker 端口映射限制为仅本机（127.0.0.1:1979）。
bind 0.0.0.0

# 修改默认监听端口
port 1979

# 启用密码认证（AUTH），明文保存在此配置文件中
dbfilename dump.rdb
requirepass InfiLed@Hermes_redis

# 重命名危险命令，提高攻击者利用 CONFIG 的难度
rename-command CONFIG RENAME_CONFIG

# 持久化（与原 compose.yaml 保持一致）
appendonly yes
appendfsync everysec

# 禁用危险命令（可选，进一步增强安全）
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""
