name: hermes

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    volumes:
      - redisdata:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "-p", "1979", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:1979:1979"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:1979/0
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-change-me-in-production}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME:-林知微}
      STORAGE_BACKEND: db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  agent-runner:
    build:
      context: ..
      dockerfile: docker/agent-runner.Dockerfile
      args:
        INSTALL_HERMES: ${INSTALL_HERMES:-false}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD:-hermes}@postgres:5432/${POSTGRES_DB:-hermes}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      WORKSPACE_ROOT: /var/hermes/workspaces
      HERMES_BIN: ${HERMES_BIN:-hermes}
      HERMES_ACP_ARGS: ${HERMES_ACP_ARGS:-["acp"]}
      HERMES_ACP_AUTH_METHOD: ${HERMES_ACP_AUTH_METHOD:-}
      ACP_ALLOW_MOCK_FALLBACK: ${ACP_ALLOW_MOCK_FALLBACK:-true}
      ACP_CONSUMER: runner-1
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_BACKEND: db
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      SANDBOX_CMD: ${SANDBOX_CMD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - workspacedata:/var/hermes/workspaces

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
  workspacedata:
